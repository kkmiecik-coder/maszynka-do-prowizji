<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maszynka do prowizji</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo">M</span>
        <span>Maszynka do prowizji</span>
        <span class="app-version" id="appVersion" title="Wersja aplikacji"></span>
      </div>
      <span class="spacer"></span>
      <button class="gear" id="configBtn" type="button" title="Konfiguracja" aria-label="Konfiguracja">⚙</button>
    </header>

    <nav class="stepper" id="stepper" aria-label="Kroki">
      <button class="step" data-step="1" type="button">
        <span class="dot">1</span><span class="text">Źródła</span>
      </button>
      <span class="connector"></span>
      <button class="step" data-step="2" type="button">
        <span class="dot">2</span><span class="text">Pliki</span>
      </button>
      <span class="connector"></span>
      <button class="step" data-step="3" type="button">
        <span class="dot">3</span><span class="text">Wysyłka</span>
      </button>
    </nav>

    <main class="main">
      <div class="panel" id="panel"></div>
    </main>

    <footer class="footer">
      <div class="footer-info" id="footerInfo"></div>
      <div class="footer-actions" id="footerActions"></div>
    </footer>
  </div>

  <!-- Blokujący modal aktualizacji (wymuszona). Domyślnie ukryty. -->
  <div class="update-overlay" id="updateOverlay" hidden>
    <div class="update-modal" role="dialog" aria-modal="true" aria-labelledby="updateTitle">
      <div class="update-icon" id="updateIcon">⬆</div>
      <h2 class="update-title" id="updateTitle">Wymagana aktualizacja</h2>
      <p class="update-text" id="updateText"></p>

      <!-- Widok pobierania (pokazywany po kliknięciu „Aktualizuj") -->
      <div class="update-progress" id="updateProgress" hidden>
        <div class="update-bar-track"><div class="update-bar-fill" id="updateBarFill"></div></div>
        <div class="update-bar-label" id="updateBarLabel">Pobieram… 0%</div>
      </div>

      <!-- Przyciski (pokazywane na starcie) -->
      <div class="update-actions" id="updateActions">
        <button class="btn btn-secondary" id="updateCancelBtn" type="button">Anuluj</button>
        <button class="btn btn-primary" id="updateStartBtn" type="button">Aktualizuj</button>
      </div>
    </div>
  </div>

  <script src="main.ui.js"></script>
</body>
</html>
